name: Notify Telegram of deploys

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Find the pull request for this commit
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });
            const pullRequest = pullRequests.find(({ merged_at }) => merged_at) ?? pullRequests[0];
            const commitUrl = `${context.serverUrl}/${owner}/${repo}/commit/${context.sha}`;

            core.setOutput('title', pullRequest?.title ?? `Direct commit ${context.sha.slice(0, 7)}`);
            core.setOutput('url', pullRequest?.html_url ?? commitUrl);

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TITLE: ${{ steps.pull-request.outputs.title }}
          MESSAGE_URL: ${{ steps.pull-request.outputs.url }}
        run: |
          message=$'New deploy in flight\n'"${MESSAGE_TITLE}"$'\n'"${MESSAGE_URL}"
          curl --fail --silent --show-error --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
