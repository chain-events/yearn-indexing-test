previewsEnabled: false

databases:
  - name: envio-postgres
    plan: basic-256mb
    databaseName: envio_indexer
    user: envio_ix_7f3a
    postgresMajorVersion: "17"

services:
  # Hasura GraphQL Engine - public-facing GraphQL API
  - type: web
    name: graphql-engine
    runtime: image
    image:
      url: hasura/graphql-engine:v2.43.0
    plan: starter
    envVars:
      - key: HASURA_GRAPHQL_DATABASE_URL
        fromDatabase:
          name: envio-postgres
          property: connectionString
      - key: HASURA_GRAPHQL_ENABLE_CONSOLE
        value: "true"
      - key: HASURA_GRAPHQL_ENABLED_LOG_TYPES
        value: "startup, http-log, webhook-log, websocket-log, query-log"
      - key: HASURA_GRAPHQL_NO_OF_RETRIES
        value: "10"
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        sync: false
      - key: HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES
        value: "true"
      - key: PORT
        value: "8080"
      - key: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
        value: "public"

  # Envio Indexer - blockchain event indexer
  - type: worker
    name: envio-indexer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: ENVIO_API_TOKEN
        sync: false
      - key: ENVIO_PG_HOST
        fromDatabase:
          name: envio-postgres
          property: host
      - key: ENVIO_PG_PORT
        fromDatabase:
          name: envio-postgres
          property: port
      - key: ENVIO_PG_USER
        fromDatabase:
          name: envio-postgres
          property: user
      - key: ENVIO_PG_PASSWORD
        fromDatabase:
          name: envio-postgres
          property: password
      - key: ENVIO_PG_DATABASE
        fromDatabase:
          name: envio-postgres
          property: database
      - key: ENVIO_PG_PUBLIC_SCHEMA
        value: "envio"
      - key: ENVIO_INDEXER_HOST
        value: "0.0.0.0"
      - key: ENVIO_INDEXER_PORT
        value: "9898"
      - key: CONFIG_FILE
        value: "config.yaml"
      - key: LOG_LEVEL
        value: "info"
      - key: LOG_STRATEGY
        value: "console-pretty"
      - key: HASURA_GRAPHQL_ENDPOINT
        fromService:
          name: graphql-engine
          type: web
          envVarKey: RENDER_INTERNAL_HOSTNAME
        # Override with actual value after deploy:
        # http://<graphql-engine-internal-host>:8080/v1/metadata
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        sync: false
      - key: HASURA_SERVICE_HOST
        fromService:
          name: graphql-engine
          type: web
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: HASURA_SERVICE_PORT
        value: "8080"
      - key: TUI_OFF
        value: "true"
